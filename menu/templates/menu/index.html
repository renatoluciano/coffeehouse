{% extends 'menu/base.html' %}
{% load static %}

{% block title %}Menu | Coffee House{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="text-center fw-bold mb-5">Our Menu</h1>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for product in products %}
        <div class="col">
            <div class="card h-100 shadow-sm border-0 text-center p-3">
                <a href="{% url 'product_detail' product.pk %}">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" class="card-img-top rounded" style="height: 200px; object-fit: cover;">
                    {% endif %}
                </a>
                <h4 class="mt-3 fw-bold">{{ product.name }}</h4>
                <div class="d-flex justify-content-between align-items-center mt-auto pt-3">
                    <span class="price-tag h5 mb-0">${{ product.price }}</span>
                    <a href="{% url 'cart_add' product.id %}" class="btn btn-coffee">Add to Cart</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
